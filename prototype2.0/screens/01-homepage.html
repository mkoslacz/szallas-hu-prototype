<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Szallas.hu — Találd meg álmaid szállását!</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --c-primary:#E30613;--c-primary-hover:#b40510;--c-cta:#E85A00;
  --c-success:#1F7F3E;--c-success-bg:#E8F5EC;
  --c-deal-bg:#FFF1E6;--c-deal-ink:#C84B00;
  --ink-900:#1F2A36;--ink-700:#394654;--ink-500:#6B7683;--ink-400:#8A93A1;
  --line:#E1E4EA;--line-strong:#C9CED6;
  --surface:#FFFFFF;--surface-2:#F5F6F8;--surface-3:#ECEEF2;
  --info:#1F6FE0;
  --radius-sm:6px;--radius:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow-sm:0 1px 2px rgba(31,42,54,.06),0 2px 6px rgba(31,42,54,.06);
  --shadow:0 2px 6px rgba(31,42,54,.06),0 6px 18px rgba(31,42,54,.08);
  --shadow-lg:0 4px 12px rgba(31,42,54,.08),0 8px 24px rgba(31,42,54,.06);
  --shadow-cta:0 6px 18px rgba(227,6,19,.28);
  --font-ui:'Inter','Segoe UI',Roboto,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff;color:var(--ink-900);font-family:var(--font-ui);font-weight:500;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;font-weight:500}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:800;color:var(--ink-900);letter-spacing:-.01em}



/* Hero */
.hero{position:relative;padding:80px 24px 24px;overflow:hidden;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);background:#1a3540}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.15) 0%,rgba(0,0,0,.55) 100%);pointer-events:none;z-index:1}
.hero-inner{position:relative;max-width:1200px;margin:0 auto;z-index:2}
.hero-tabs{display:flex;gap:8px;margin-bottom:18px}
.hero-tab{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.32);font-size:14px;font-weight:600;cursor:pointer}
.hero-tab.active{background:#fff;color:var(--ink-900);border-color:#fff}
.hero h1{font-size:48px;line-height:1.1;color:#fff;margin-bottom:8px}
.hero .sub{font-size:18px;color:#fff;opacity:.92;margin-bottom:32px}
.hero-search{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--line-strong);box-shadow:var(--shadow-lg);width:100%;display:flex;align-items:stretch;color:var(--ink-900);text-shadow:none;position:relative;overflow:hidden}
.hero-search .cell{flex:1;padding:12px 18px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;border-right:1px solid var(--line);min-width:0}
.hero-search .cell:last-of-type{border-right:0}
.hero-search .cell .lbl{font-size:10.5px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.hero-search .cell input{border:0;font-size:14px;color:var(--ink-900);font-weight:600;padding:2px 0;font-family:inherit;background:transparent;outline:none;width:100%}
.hero-search .btn-search{padding:0 28px;background:var(--c-primary);color:#fff;border:0;font-weight:800;font-size:14px;border-radius:0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.hero-search .btn-search:hover{background:var(--c-primary-hover)}
.hero-trust{display:flex;gap:24px;margin-top:18px;font-size:13.5px;color:#fff;opacity:.92;flex-wrap:wrap}
.hero-trust span{display:inline-flex;gap:6px;align-items:center}

/* Typeahead */
.typeahead{position:absolute;top:calc(100% + 6px);left:0;width:340px;background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;z-index:20;border:1px solid var(--line)}
.typeahead-item{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--surface-3);cursor:pointer}
.typeahead-item:last-of-type{border-bottom:0}
.typeahead-item:hover{background:var(--surface-2)}
.typeahead-thumb{width:44px;height:44px;border-radius:var(--radius);background:linear-gradient(135deg,#dbe6ec,#a7c5d3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.typeahead-name{font-weight:700;font-size:14px;color:var(--ink-900)}
.typeahead-meta{font-size:12px;color:var(--ink-500);margin-top:2px}

/* Sections */
section.block{max-width:1200px;margin:0 auto;padding:48px 24px}
section.block h2{font-size:26px;margin-bottom:16px}
.block-sub{color:var(--ink-500);font-size:14px;margin-top:-12px;margin-bottom:18px}

/* Sticky compact search bar — slides up + sticks to top once hero scrolls past */
.search-pad-sticky{background:#fff;border-bottom:1px solid var(--line);padding:10px 24px;position:sticky;top:0;z-index:30;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.search-pad-sticky .sps-inner{max-width:1100px;margin:0 auto;display:flex;background:#fff;align-items:stretch;border:1px solid var(--line-strong);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden}
.search-pad-sticky .sps-cell{flex:1;padding:8px 16px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;border-right:1px solid var(--line);min-width:0}
.search-pad-sticky .sps-cell:last-of-type{border-right:0}
.search-pad-sticky .sps-cell .lbl{font-size:10.5px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em;font-weight:700;line-height:1.2}
.search-pad-sticky .sps-cell .val{font-size:14px;color:var(--ink-900);font-weight:600;line-height:1.2;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-pad-sticky .sps-btn{padding:0 24px;background:var(--c-primary);color:#fff;border:0;border-radius:0;font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.search-pad-sticky .sps-btn:hover{background:var(--c-primary-hover)}

/* Categories carousel */
.cat-row{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;overflow-x:auto;scroll-snap-type:x mandatory}
@media (max-width:1100px){.cat-row{grid-template-columns:repeat(4,1fr)}}
@media (max-width:700px){.cat-row{grid-template-columns:repeat(2,1fr)}}
.cat-tile{position:relative;aspect-ratio:1/1.15;border-radius:var(--radius-lg);overflow:hidden;background:#a7c5d3 center/cover;display:flex;align-items:flex-end;padding:14px;color:#fff;font-weight:800;font-size:14px;text-shadow:0 2px 6px rgba(0,0,0,.6);cursor:pointer;transition:transform .15s}
.cat-tile:hover{transform:translateY(-2px)}
.cat-tile::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.6) 100%);pointer-events:none}
.cat-tile > span{position:relative;z-index:1}

/* Top offers grid */
.offers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media (max-width:1000px){.offers-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.offers-grid{grid-template-columns:1fr}}
.offer-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:box-shadow .15s, transform .15s;display:flex;flex-direction:column}
.offer-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.offer-img{aspect-ratio:16/10;position:relative;background:#dbe6ec center/cover}
.offer-score{position:absolute;top:10px;right:10px;width:40px;height:40px;border-radius:8px;background:var(--c-success);color:#fff;font-weight:800;font-size:14px;display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.offer-heart{position:absolute;top:10px;left:10px;width:34px;height:34px;background:rgba(255,255,255,.92);border:0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-700)}
.offer-info{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px}
.offer-info h3{font-size:16px;color:var(--info)}
.offer-info .city{font-size:12.5px;color:var(--ink-500)}
.offer-price{margin-top:auto;font-size:22px;font-weight:900;color:var(--c-cta);font-family:var(--font-ui)}
.offer-price .ft{font-size:13px;color:var(--ink-700);font-weight:600}
.offer-priceunit{font-size:11.5px;color:var(--ink-500);margin-top:-2px}

/* VIP banner */
.vip-banner{background:linear-gradient(135deg,#FFE8EA 0%,#FFF1E6 100%);border-radius:var(--radius-xl);padding:28px 32px;display:flex;gap:24px;align-items:center;border:1px solid var(--primary-soft, #FFE8EA)}
.vip-banner .vip-word{font-size:64px;font-weight:900;color:var(--c-cta);font-style:italic;line-height:1;letter-spacing:-.04em}
.vip-banner-body{flex:1}
.vip-banner h3{font-size:22px;color:var(--ink-900)}
.vip-banner h3 .red{color:var(--c-primary)}
.vip-banner p{font-size:14px;color:var(--ink-700);margin:6px 0 14px;line-height:1.5}
.vip-banner button{padding:10px 22px;background:var(--c-cta);color:#fff;border:0;border-radius:var(--radius);font-weight:800;cursor:pointer}

/* Mobile discount */
.mobile-banner{background:linear-gradient(135deg,#E8F5EC,#D4EAD9);border-radius:var(--radius-xl);padding:24px 32px;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
.mobile-banner h3{color:var(--c-success);font-size:20px}
.mobile-banner p{font-size:13.5px;color:var(--ink-700);margin-top:4px}
.mobile-banner button{padding:10px 18px;background:var(--c-success);color:#fff;border:0;border-radius:var(--radius);font-weight:800;cursor:pointer}

/* Inspirations mosaic */
.mosaic{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:200px 200px;gap:12px}
.mosaic > *{border-radius:var(--radius-lg);overflow:hidden;position:relative;cursor:pointer;color:#fff;font-weight:800;font-size:16px;display:flex;align-items:flex-end;padding:16px;text-shadow:0 2px 6px rgba(0,0,0,.6);background-size:cover;background-position:center}
.mosaic > *::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.6) 100%);pointer-events:none}
.mosaic > * > span{position:relative;z-index:1}
.mosaic > *:nth-child(1){grid-row:1/3}
.mosaic > *:nth-child(4){grid-row:1/3}
@media (max-width:800px){.mosaic{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto}.mosaic > *:nth-child(1){grid-row:auto}.mosaic > *:nth-child(4){grid-row:auto}}

/* Featured grid */
.featured-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media (max-width:1000px){.featured-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){.featured-grid{grid-template-columns:1fr}}

/* Tweaks indicator */
.tweaks-indicator{position:fixed;left:24px;bottom:24px;z-index:50;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:8px 14px;font-size:12px;color:var(--ink-700);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:8px;max-width:340px}
.tweaks-indicator .lbl{font-weight:800;color:var(--ink-900);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.tweaks-indicator .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;background:var(--c-success-bg);color:var(--c-success);font-weight:700;font-size:11px}
.tweaks-indicator a{color:var(--c-primary);text-decoration:underline;font-size:11px;font-weight:600}

/* Footer */
.footer{background:#0f1419;color:#cbd2da;padding:48px 24px 24px;margin-top:48px}
.footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px}
.footer h5{color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.footer ul{list-style:none;padding:0;margin:0;display:grid;gap:8px;font-size:13.5px}
.footer a{color:#cbd2da}
.footer-bottom{max-width:1200px;margin:32px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;font-size:12.5px;color:#8a93a1}
.footer-trust{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.footer-trust-badge{padding:5px 10px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:11px}
@media (max-width:900px){.footer-inner{grid-template-columns:repeat(2,1fr)}}
@media (max-width:900px){.hero h1{font-size:32px}}
  
/* === Shared brandbar (master library, mirror PDP) === */
.brandbar{background:#D20000;border-bottom:1px solid #8c040d;height:60px;overflow:visible}
.brandbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px;flex-wrap:nowrap;min-width:0;overflow:visible}
.brandbar .brand-right{color:#fff;margin-left:auto;display:flex;gap:14px;align-items:center;font-size:14px}
.brandbar .callcenter-trigger,.brandbar .account-btn,.brandbar .hamburger-trigger{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;backdrop-filter:blur(4px)}
.brandbar .callcenter-trigger:hover,.brandbar .account-btn:hover,.brandbar .hamburger-trigger:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5);color:#fff}
.brandbar .cc-ring{background:rgba(255,255,255,.18);color:#fff}
.brandbar .account-btn:hover .cc-ring{background:#fff;color:var(--c-primary)}
.brandbar .cc-lbl{color:rgba(255,255,255,.82)}
.brandbar .cc-num,.brandbar .cc-chev{color:#fff}
.logo-brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:inherit;flex-shrink:0;white-space:nowrap;height:60px}
.logo-word{font-family:'Inter',serif;font-size:26px;line-height:1;letter-spacing:-.5px;color:#fff;font-style:italic;font-weight:900;white-space:nowrap;flex-shrink:0}
.logo-dot{color:#FF5A00}
.logo-tag{position:relative;background:#fff;color:var(--c-primary);font-size:10px;font-weight:800;line-height:1.05;padding:6px 9px 7px;border-radius:999px;display:inline-flex;flex-direction:column;text-align:center;letter-spacing:.01em;transform:rotate(-6deg);box-shadow:0 2px 6px rgba(0,0,0,.18)}
.logo-tag::after{content:"";position:absolute;left:-5px;bottom:3px;width:10px;height:10px;background:#fff;border-radius:2px;transform:rotate(45deg);clip-path:polygon(0 0, 100% 100%, 0 100%)}
.logo-tag span{white-space:nowrap}
.callcenter{position:relative}
.callcenter-trigger{display:inline-flex;align-items:center;gap:12px;padding:5px 18px 5px 5px;border-radius:999px;cursor:pointer;transition:all .15s;border:1px solid transparent;background:transparent}
.cc-ring{width:38px;height:38px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.cc-text{display:flex;flex-direction:column;line-height:1.15;text-align:left}
.cc-lbl{font-size:11.5px;margin-top:2px}
.cc-num{font-size:15px;font-weight:800;letter-spacing:.01em;font-variant-numeric:tabular-nums}
.cc-chev{font-size:14px;margin-left:6px}
.account-btn{display:inline-flex;align-items:center;gap:10px;padding:5px 16px 5px 5px;border-radius:999px;cursor:pointer;transition:all .15s;font-family:inherit;background:transparent;border:1px solid transparent}
.hamburger{position:relative}
.hamburger-trigger{width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;font-size:18px}
/* === end shared brandbar === */

/* === MOBILE OVERRIDES (only when html[data-view="mobile"] set by tweaks-overlay) === */
html[data-view="mobile"] .hero{padding:28px 14px 18px}
html[data-view="mobile"] .hero-tabs{gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
html[data-view="mobile"] .hero-tab{padding:6px 12px;font-size:12px;flex-shrink:0;white-space:nowrap}
html[data-view="mobile"] .hero h1{font-size:24px;line-height:1.15;margin-bottom:6px}
html[data-view="mobile"] .hero .sub{font-size:13.5px;margin-bottom:14px}
html[data-view="mobile"] .hero-search{flex-direction:column;border-radius:14px;overflow:hidden;align-items:stretch}
html[data-view="mobile"] .hero-search .cell{border-right:0;border-bottom:1px solid var(--line);padding:10px 14px}
html[data-view="mobile"] .hero-search .cell:last-of-type{border-bottom:0}
html[data-view="mobile"] .hero-search .cell input{font-size:14px}
html[data-view="mobile"] .hero-search .btn-search{border-radius:0 0 14px 14px;padding:14px 16px;width:100%;justify-content:center;font-size:14.5px}
html[data-view="mobile"] .typeahead{width:100%;left:0;right:0}
html[data-view="mobile"] .hero-trust{flex-direction:column;gap:6px;font-size:12px;margin-top:14px}
html[data-view="mobile"] section.block{padding:24px 14px}
html[data-view="mobile"] section.block h2{font-size:18px;margin-bottom:12px}
html[data-view="mobile"] .block-sub{font-size:12.5px;margin-bottom:14px}
html[data-view="mobile"] .cat-row{grid-template-columns:repeat(2,1fr);gap:8px}
html[data-view="mobile"] .cat-tile{padding:10px;font-size:12.5px}
html[data-view="mobile"] .offers-grid{grid-template-columns:1fr;gap:12px}
html[data-view="mobile"] .featured-grid{grid-template-columns:1fr;gap:12px}
html[data-view="mobile"] .offer-info h3{font-size:15px}
html[data-view="mobile"] .offer-price{font-size:19px}
html[data-view="mobile"] .mosaic{grid-template-columns:1fr 1fr;grid-template-rows:140px 140px 140px;gap:8px}
html[data-view="mobile"] .mosaic > *:nth-child(1),
html[data-view="mobile"] .mosaic > *:nth-child(4){grid-row:auto}
html[data-view="mobile"] .mosaic > *{padding:10px;font-size:13px}
html[data-view="mobile"] .vip-banner{flex-direction:column;gap:12px;padding:20px 18px;text-align:center}
html[data-view="mobile"] .vip-banner .vip-word{font-size:44px}
html[data-view="mobile"] .vip-banner h3{font-size:18px}
html[data-view="mobile"] .vip-banner p{font-size:13px}
html[data-view="mobile"] .mobile-banner{flex-direction:column;text-align:center;gap:12px;padding:20px 18px}
html[data-view="mobile"] .mobile-banner h3{font-size:17px}
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const fmt = (n) => new Intl.NumberFormat('hu-HU').format(Math.round(n));
const photo = (seed, w=600, h=400) => `https://picsum.photos/seed/szhomepage-${seed}/${w}/${h}`;

// Read PDP-saved tweaks
const tw = (()=>{ try{ return JSON.parse(localStorage.getItem('szallas_tweaks'))||{}; }catch(e){ return {}; } })();
const priceFor = (p, mode) => mode==='nightly' ? p : mode==='per-person' ? Math.round(p/2) : p; // top offers are /fő/éj by default, so 'total' would *2
const pmSuffix = (mode) => mode==='nightly' ? '/éj' : mode==='total' ? '2 fő · 1 éj' : '/fő/éj';
const activeTweakChips = [];
if (tw.priceMode && tw.priceMode !== 'total') activeTweakChips.push(`price: ${tw.priceMode}`);
if (tw.loggedIn) activeTweakChips.push('VIP −15%');
if (tw.showVipTeaser === false) activeTweakChips.push('VIP teaser off');

const CATEGORIES = [
  { id:'pentecost', lbl:'Pünkösdi hosszú hétvége', img: photo('pentecost', 400, 460) },
  { id:'best-balaton', lbl:'A Balaton legjobb ajánlatai', img: photo('balaton-best', 400, 460) },
  { id:'wellness', lbl:'Wellness és spa', img: photo('wellness-spa', 400, 460) },
  { id:'croatia', lbl:'Horvátország legjobb ajánlatai', img: photo('croatia', 400, 460) },
  { id:'halfboard', lbl:'Szállások félpanzióval', img: photo('halfboard', 400, 460) },
  { id:'top-cities', lbl:'TOP úti célok', img: photo('top-cities', 400, 460) },
  { id:'castles', lbl:'Romantikus kastélyszállók', img: photo('castles', 400, 460) },
  { id:'wood-houses', lbl:'Faházak', img: photo('wood-houses', 400, 460) }
];

const TOP_OFFERS = [
  { name:'Hotel Vécsecity Hernádvécse', city:'Hernádvécse', score:9.3, price:24673, img: photo('vecsecity', 600, 400) },
  { name:'Hotel Aquarell Cegléd', city:'Cegléd', score:9.1, price:22576, img: photo('aquarell', 600, 400) },
  { name:'Bellevue Hotel Esztergom', city:'Esztergom', score:8.6, price:21863, img: photo('bellevue', 600, 400) },
  { name:'Ensana Thermal Sárvár', city:'Sárvár', score:9.5, price:25490, img: photo('ensana-sarvar', 600, 400) },
  { name:'Wellness Hotel Gyula', city:'Gyula', score:9.5, price:33193, img: photo('gyula', 600, 400) },
  { name:'Hotel Szieszta Sopron', city:'Sopron', score:9.4, price:30545, img: photo('szieszta', 600, 400) }
