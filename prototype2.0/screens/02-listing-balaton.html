<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balaton szálláshelyek · Szallas.hu</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --c-primary:#E30613;--c-primary-hover:#b40510;--c-cta:#E85A00;
  --c-success:#1F7F3E;--c-success-bg:#E8F5EC;
  --c-deal-bg:#FFF1E6;--c-deal-ink:#C84B00;--c-warn-low:#F5A524;
  --primary-soft:#FFE8EA;--primary-border:#F6C5C9;
  --ink-900:#1F2A36;--ink-700:#394654;--ink-500:#6B7683;--ink-400:#8A93A1;--ink-300:#A1A8B3;
  --line:#E1E4EA;--line-strong:#C9CED6;
  --surface:#FFFFFF;--surface-2:#F5F6F8;--surface-3:#ECEEF2;
  --info:#1F6FE0;
  --radius-sm:6px;--radius:10px;--radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(31,42,54,.06),0 2px 6px rgba(31,42,54,.06);
  --shadow:0 2px 6px rgba(31,42,54,.06),0 6px 18px rgba(31,42,54,.08);
  --shadow-lg:0 4px 12px rgba(31,42,54,.08),0 8px 24px rgba(31,42,54,.06);
  --shadow-cta:0 6px 18px rgba(227,6,19,.28);
  --font-ui:'Inter','Segoe UI',Roboto,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--surface-2);color:var(--ink-900);font-family:var(--font-ui);font-weight:500;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;font-weight:500}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:800;color:var(--ink-900);letter-spacing:-.01em}

/* BrandBar */
.brandbar{background:#D20000;border-bottom:1px solid #8c040d;height:60px}
.brandbar-inner{max-width:1400px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px}
.brandbar-logo{color:#fff;font-style:italic;font-weight:900;font-size:24px;letter-spacing:-.5px}
.brandbar-logo .dot{color:#FF5A00}
.brandbar-actions{margin-left:auto;display:flex;gap:10px;align-items:center;color:#fff;font-size:14px}
.brandbar-actions a{padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff}

/* Persistent search — pas pod brand bar */
.search-pad{background:#fff;border-bottom:1px solid var(--line);padding:10px 24px;position:sticky;top:0;z-index:30}
.search-bar{display:flex;max-width:1100px;margin:0 auto;background:#fff;border-radius:var(--radius-lg);align-items:stretch;border:1px solid var(--line-strong);box-shadow:var(--shadow-sm)}
.search-bar > .field-cell{flex:1;padding:8px 16px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;border-right:1px solid var(--line);min-width:0}
.search-bar > .field-cell:last-of-type{border-right:0}
.search-bar > .field-cell .lbl{font-size:10.5px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.search-bar > .field-cell .val{font-size:14px;color:var(--ink-900);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-bar > .btn-search{padding:0 24px;background:var(--c-primary);color:#fff;border:0;font-weight:800;font-size:14px;border-radius:0 var(--radius-lg) var(--radius-lg) 0;display:flex;align-items:center;gap:6px;flex-shrink:0}
.search-bar > .btn-search:hover{background:var(--c-primary-hover)}

/* Quick-filter chips */
.quick-chips{display:flex;gap:6px;padding:8px 0 4px;overflow-x:auto;flex-wrap:nowrap}
.quick-chips button{flex:0 0 auto;padding:6px 12px;background:#fff;border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--ink-700);font-weight:600;white-space:nowrap}
.quick-chips button:hover{border-color:var(--c-primary);color:var(--c-primary)}
.quick-chips button.active{background:var(--c-primary);color:#fff;border-color:var(--c-primary)}

/* Page layout 3 cols */
.page{max-width:1400px;margin:0 auto;padding:0 24px}
.title-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin:8px 0 4px}
.title-row h1{font-size:28px}
.title-row .counter{color:var(--ink-500);font-size:14px}
.title-row .counter a{color:var(--c-primary);font-weight:600;margin-left:8px;text-decoration:underline}

.disclosure{padding:7px 12px;background:#FFF8E1;border:1px solid #F6E4B0;border-radius:var(--radius);font-size:12px;color:var(--ink-700);margin:6px 0 10px;display:flex;gap:8px;align-items:center}
.disclosure b{color:var(--ink-900)}
.disclosure a{color:var(--c-primary);text-decoration:underline}

/* Default: single-column list (filters left, list right, no map) */
.layout{display:grid;grid-template-columns:240px minmax(0,1fr);gap:18px;align-items:start}
.layout.with-map{grid-template-columns:240px minmax(0,1fr) 380px}
@media (max-width:1300px){.layout.with-map{grid-template-columns:220px minmax(0,1fr) 320px}}
@media (max-width:1100px){.layout.with-map{grid-template-columns:220px minmax(0,1fr)} .layout.with-map .map-col{display:none}}
@media (max-width:900px){.layout{grid-template-columns:1fr}.filters-col{display:none}.layout.with-map .map-col{display:none}}

/* View toggle button-row */
.view-toggle{display:inline-flex;gap:0;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:3px;margin-left:10px;flex-shrink:0}
.view-toggle button{padding:6px 14px;border:0;background:transparent;color:var(--ink-700);font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.view-toggle button.on{background:var(--c-primary);color:#fff;box-shadow:var(--shadow-sm)}

/* Floating "Show on map" FAB — Booking-style bottom-right of viewport */
.map-fab{position:fixed;right:28px;bottom:28px;z-index:50;display:inline-flex;align-items:center;gap:10px;padding:12px 18px;background:var(--ink-900);color:#fff;border:0;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:transform .15s, box-shadow .15s}
.map-fab:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.3)}
.map-fab .thumb{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,#aac6d3,#7ba9bb);position:relative}
.map-fab .thumb::after{content:'📍';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px}

/* Fullscreen map overlay */
.map-fullscreen{position:fixed;inset:0;background:#fff;z-index:200;display:flex;flex-direction:column}
.map-fs-top{padding:12px 20px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-shrink:0}
.map-fs-top h2{font-size:16px;flex:1}
.map-fs-close{padding:8px 14px;background:var(--ink-900);color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}
.map-fs-body{flex:1;position:relative;overflow:hidden}
.map-fs-body .map-col{position:absolute !important;inset:0 !important;height:100% !important;max-height:none !important;top:0 !important;border-radius:0}

/* Conversion: results header — compact one-liner */
.results-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin:6px 0 10px;flex-wrap:wrap}
.results-bar .summary-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--ink-700)}
.results-bar .summary-left b{color:var(--ink-900)}
.results-bar .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.results-bar select{padding:8px 12px;border:1px solid var(--line-strong);border-radius:var(--radius);background:#fff;font-family:inherit;font-size:13px;font-weight:600}

/* VIP teaser inside list */
.vip-list-teaser{background:linear-gradient(135deg,#FFE8EA,#FFF1E6);border:1px solid #F6C5C9;border-radius:var(--radius-lg);padding:14px 18px;display:flex;gap:14px;align-items:center;margin:0}
.vip-list-teaser .vip-word{font-size:32px;font-weight:900;color:var(--c-cta);font-style:italic;line-height:1;letter-spacing:-.02em;flex-shrink:0}
.vip-list-teaser .body{flex:1}
.vip-list-teaser h4{font-size:15px;color:var(--ink-900);margin-bottom:2px}
.vip-list-teaser p{margin:0;font-size:12.5px;color:var(--ink-700)}
.vip-list-teaser button{padding:8px 16px;background:var(--c-cta);color:#fff;border:0;border-radius:8px;font-weight:800;cursor:pointer;flex-shrink:0;font-size:13px}

/* Filters */
.filters-col{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);position:sticky;top:84px;max-height:calc(100vh - 100px);overflow-y:auto}
.fl-group{padding:14px 16px;border-bottom:1px solid var(--line)}
.fl-group:last-of-type{border-bottom:0}
.fl-title{font-size:13px;font-weight:800;color:var(--ink-900);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.fl-title .chev{transition:transform .15s}
.fl-title.collapsed .chev{transform:rotate(-90deg)}
.fl-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:var(--ink-700);gap:8px;cursor:pointer}
.fl-row:hover{color:var(--ink-900)}
.fl-row input[type="checkbox"]{accent-color:var(--c-primary);flex-shrink:0}
.fl-row .cnt{color:var(--ink-400);font-size:12.5px}

/* Hotel cards — Booking-style compact, 3 fit in 900px viewport */
.list-col{display:flex;flex-direction:column;gap:10px;min-width:0}
.hotel-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);display:grid;grid-template-columns:minmax(200px,240px) minmax(0,1fr) minmax(170px,200px);overflow:hidden;transition:box-shadow .15s, border-color .15s;cursor:pointer;min-height:172px}
.hotel-card:hover{box-shadow:var(--shadow);border-color:var(--line-strong)}
.hotel-card.highlight{box-shadow:0 0 0 3px var(--c-primary);border-color:var(--c-primary)}
.hotel-img{position:relative;background-size:cover;background-position:center;min-height:172px}
.hotel-img img{display:block;width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.hotel-img .heart{position:absolute;top:10px;left:10px;width:34px;height:34px;background:rgba(255,255,255,.92);border:0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-700);z-index:2;font-size:15px;line-height:1}
.hotel-img .heart.saved{color:var(--c-primary)}
.hotel-img .discount{position:absolute;top:10px;right:10px;background:var(--c-cta);color:#fff;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:800;z-index:2}
.hotel-img .vip-eligible{position:absolute;bottom:10px;left:10px;background:rgba(110,46,229,.94);color:#fff;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:800;z-index:2;letter-spacing:.02em}
.hotel-img-label{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;z-index:2}
.hotel-info{padding:14px 16px 14px 18px;display:flex;flex-direction:column;gap:6px;min-width:0;border-right:1px solid var(--line)}
.hotel-info .name-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.hotel-info h3{font-size:16px;color:var(--info);font-weight:700;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.hotel-info .stars{color:var(--c-warn-low);letter-spacing:1px;font-size:12px;flex-shrink:0}
.hotel-info .stars .superior{color:var(--info);font-size:11px;margin-left:4px;font-weight:600}
.hotel-info .location{font-size:12.5px;color:var(--ink-700)}
.hotel-info .location .pin{color:var(--ink-400);margin-right:3px}
.hotel-info .amenities{display:flex;gap:8px;flex-wrap:wrap;color:var(--ink-500);font-size:13px;margin-top:1px}
.hotel-info .quote{font-size:12px;color:var(--ink-700);font-style:italic;background:var(--surface-2);padding:6px 10px;border-radius:6px;border-left:2px solid var(--c-success);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;text-overflow:ellipsis}
.hotel-info .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:4px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;flex-shrink:0}
.badge.board-br{background:var(--c-success-bg);color:var(--c-success)}
.badge.board-hp{background:var(--c-deal-bg);color:var(--c-deal-ink)}
.badge.board-ai{background:#F5EAFF;color:#6B21A8}
.badge.cancel{background:var(--c-success-bg);color:var(--c-success)}
.badge.szep{background:#EFF6FF;color:#1E40AF}
.badge.noref{background:#FEF2F2;color:#991B1B}
.hotel-price{padding:14px 16px;display:flex;flex-direction:column;align-items:stretch;justify-content:space-between;background:var(--surface-2);gap:8px;min-width:0}
.hotel-score{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.hotel-score-text{text-align:right}
.hotel-score-text .lbl{font-size:12.5px;color:var(--ink-900);font-weight:800;line-height:1.1}
.hotel-score-text .cnt{font-size:10.5px;color:var(--ink-500)}
.hotel-score .num{width:38px;height:38px;border-radius:8px;background:var(--c-success);color:#fff;font-weight:800;font-size:14.5px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-sm)}
.hotel-pricing{text-align:right;margin-top:auto}
.hotel-strike{text-decoration:line-through;color:var(--ink-400);font-size:13px;display:block}
.hotel-bigprice{color:var(--c-cta);font-weight:900;font-size:22px;font-family:var(--font-ui);letter-spacing:-.01em;line-height:1.1;display:flex;align-items:baseline;gap:3px;justify-content:flex-end}
.hotel-bigprice .ft{font-size:13px;color:var(--ink-700);font-weight:600}
.hotel-priceunit{font-size:11.5px;color:var(--ink-500);margin-top:1px}
.hotel-tax{font-size:11px;color:var(--ink-500)}
.hotel-cta{display:block;width:100%;padding:9px 14px;background:var(--c-primary);color:#fff;border:0;border-radius:8px;font-weight:700;font-size:13.5px;cursor:pointer;transition:all .15s;text-align:center}
.hotel-cta:hover{background:var(--c-primary-hover)}
@media (max-width:900px){.hotel-card{grid-template-columns:1fr}.hotel-img{min-height:180px}.hotel-price{align-items:flex-start;text-align:left}.hotel-info{border-right:0;border-bottom:1px solid var(--line)}.hotel-bigprice{justify-content:flex-start}.hotel-pricing{text-align:left}}

/* Map column */
.map-col{position:sticky;top:84px;height:calc(100vh - 100px);border-radius:var(--radius-lg);overflow:hidden;background:#dbe6ec;box-shadow:var(--shadow-sm)}
.map-col > div{width:100%;height:100%}
.price-pin-html{background:var(--c-primary);color:#fff;padding:5px 10px;border-radius:12px;font-weight:800;font-size:12.5px;border:2px solid #fff;box-shadow:0 4px 12px rgba(227,6,19,.35);white-space:nowrap}
.price-pin-html.active{background:var(--c-success);box-shadow:0 4px 14px rgba(31,127,62,.45);transform:scale(1.1)}

/* Footer */
.footer{background:#0f1419;color:#cbd2da;padding:48px 24px 24px;margin-top:48px}
.footer-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px}
.footer h5{color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.footer ul{list-style:none;padding:0;margin:0;display:grid;gap:8px;font-size:13.5px}
.footer a{color:#cbd2da}
.footer-bottom{max-width:1400px;margin:32px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;font-size:12.5px;color:#8a93a1}
.footer-trust{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.footer-trust-badge{padding:5px 10px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:11px}
@media (max-width:900px){.footer-inner{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>

const MapView = ({ hotels, activeId, onMarkerClick }) => {
  const mapRef = React.useRef(null);
  const mapObj = React.useRef(null);
  const markers = React.useRef({});

  React.useEffect(() => {
    if (!mapRef.current || mapObj.current) return;
    if (typeof L === 'undefined') return;
    const map = L.map(mapRef.current, { scrollWheelZoom: true }).setView([46.85, 17.85], 9);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'© OpenStreetMap' }).addTo(map);
    hotels.forEach(h => {
      const icon = L.divIcon({
        className:'price-pin-wrap',
        html:`<div class="price-pin-html" data-id="${h.id}">${fmt(h.price)} Ft</div>`,
        iconSize:[80,30],
        iconAnchor:[40,15]
      });
      const m = L.marker([h.lat, h.lng], { icon })
        .bindPopup(`<div style="font-weight:700">${h.name}</div><div style="font-size:12px;color:#6B7683">${h.city} · ${h.scoreLbl} ${h.score}</div><div style="font-size:13px;color:#E85A00;font-weight:800;margin-top:4px">${fmt(h.price)} Ft / 2 fő, 1 éj</div>`)
        .addTo(map);
      m.on('click', () => onMarkerClick && onMarkerClick(h.id));
      markers.current[h.id] = m;
    });
    mapObj.current = map;
    return () => { map.remove(); mapObj.current = null; };
  }, []);

  React.useEffect(() => {
    if (!mapObj.current) return;
    Object.entries(markers.current).forEach(([id, m]) => {
      const el = m.getElement()?.querySelector('.price-pin-html');
      if (el) el.classList.toggle('active', id===activeId);
    });
    if (activeId && markers.current[activeId]) {
      const m = markers.current[activeId];
      mapObj.current.flyTo(m.getLatLng(), Math.max(mapObj.current.getZoom(), 11), { duration:0.6 });
    }
  }, [activeId]);

  return <div className="map-col"><div ref={mapRef}/></div>;
};
