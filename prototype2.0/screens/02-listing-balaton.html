<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balaton szálláshelyek · Szallas.hu</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --c-primary:#E30613;--c-primary-hover:#b40510;--c-cta:#E85A00;
  --c-success:#1F7F3E;--c-success-bg:#E8F5EC;
  --c-deal-bg:#FFF1E6;--c-deal-ink:#C84B00;--c-warn-low:#F5A524;
  --primary-soft:#FFE8EA;--primary-border:#F6C5C9;
  --ink-900:#1F2A36;--ink-700:#394654;--ink-500:#6B7683;--ink-400:#8A93A1;--ink-300:#A1A8B3;
  --line:#E1E4EA;--line-strong:#C9CED6;
  --surface:#FFFFFF;--surface-2:#F5F6F8;--surface-3:#ECEEF2;
  --info:#1F6FE0;
  --radius-sm:6px;--radius:10px;--radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(31,42,54,.06),0 2px 6px rgba(31,42,54,.06);
  --shadow:0 2px 6px rgba(31,42,54,.06),0 6px 18px rgba(31,42,54,.08);
  --shadow-lg:0 4px 12px rgba(31,42,54,.08),0 8px 24px rgba(31,42,54,.06);
  --shadow-cta:0 6px 18px rgba(227,6,19,.28);
  --font-ui:'Inter','Segoe UI',Roboto,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--surface-2);color:var(--ink-900);font-family:var(--font-ui);font-weight:500;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;font-weight:500}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:800;color:var(--ink-900);letter-spacing:-.01em}

/* BrandBar */


/* Persistent search — pas pod brand bar */
.search-pad{background:#fff;border-bottom:1px solid var(--line);padding:8px 24px;position:sticky;top:0;z-index:30}
.search-pad-row{display:flex;align-items:stretch;gap:12px;max-width:1100px;margin:0 auto}
.search-pad-row .search-bar{flex:1;max-width:none;margin:0}
/* Slide-in toolbar — lm-toggle + sort enter the sticky bar from the right on scroll */
.search-pad .search-pad-actions{display:none;align-items:center;gap:10px}
.search-pad.scrolled .search-pad-actions{display:flex;animation:slide-in .25s ease both}
@keyframes slide-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.search-pad-actions .lm-toggle{margin-left:0}
.search-pad-actions .sticky-sort{padding:7px 10px;border:1px solid var(--line-strong);border-radius:var(--radius);background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.search-bar{display:flex;max-width:1100px;margin:0 auto;background:#fff;border-radius:var(--radius-lg);align-items:stretch;border:1px solid var(--line-strong);box-shadow:var(--shadow-sm)}
.search-bar > .field-cell{flex:1;padding:8px 16px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;border-right:1px solid var(--line);min-width:0}
.search-bar > .field-cell:last-of-type{border-right:0}
.search-bar > .field-cell .lbl{font-size:10.5px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.search-bar > .field-cell .val{font-size:14px;color:var(--ink-900);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-bar > .btn-search{padding:0 24px;background:var(--c-primary);color:#fff;border:0;font-weight:800;font-size:14px;border-radius:0 var(--radius-lg) var(--radius-lg) 0;display:flex;align-items:center;gap:6px;flex-shrink:0}
.search-bar > .btn-search:hover{background:var(--c-primary-hover)}

/* Quick-filter chips */
.quick-chips{display:flex;gap:6px;padding:6px 0 2px;overflow-x:auto;flex-wrap:nowrap}
.quick-chips button{flex:0 0 auto;padding:6px 12px;background:#fff;border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--ink-700);font-weight:600;white-space:nowrap}
.quick-chips button:hover{border-color:var(--ink-700);color:var(--ink-900)}
.quick-chips button.active{background:var(--ink-900);color:#fff;border-color:var(--ink-900)}

/* Page layout 3 cols */
.page{max-width:1400px;margin:0 auto;padding:0 24px}
.title-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin:4px 0 2px}
.title-row h1{font-size:28px}
.title-row .counter{color:var(--ink-500);font-size:14px}
.title-row .counter a{color:var(--c-primary);font-weight:600;margin-left:8px;text-decoration:underline}

.disclosure{font-size:10.5px;color:var(--ink-500);margin:2px 0 6px;line-height:1.4}
.disclosure a{color:var(--c-primary);text-decoration:underline}

/* Default: single-column list (filters left, list right, no map) */
.layout{display:grid;grid-template-columns:240px minmax(0,1fr);gap:18px;align-items:start}
.layout.with-map{grid-template-columns:240px minmax(0,1fr) 380px}
@media (max-width:1300px){.layout.with-map{grid-template-columns:220px minmax(0,1fr) 320px}}
@media (max-width:1100px){.layout.with-map{grid-template-columns:220px minmax(0,1fr)} .layout.with-map .map-col{display:none}}
@media (max-width:900px){.layout{grid-template-columns:1fr}.filters-col{display:none}.layout.with-map .map-col{display:none}}

/* View toggle button-row */
.lm-toggle{display:inline-flex;gap:0;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:3px;margin-left:10px;flex-shrink:0}
.lm-toggle button{padding:6px 14px;border:0;background:transparent;color:var(--ink-700);font-weight:700;font-size:13px;cursor:pointer;border-radius:999px;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.lm-toggle button.on{background:var(--ink-900);color:#fff;box-shadow:var(--shadow-sm)}
/* Short label only visible on mobile (see html[data-view="mobile"] rules below) */
.lm-toggle .lm-label-short{display:none}

/* Bottom breadcrumbs — desktop hides them (top crumbs are shown instead) */
.crumbs-bottom{display:none}

/* Map button inside filters column (sticky top of sidebar) */
.filters-map-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;background:linear-gradient(135deg,#aac6d3,#7ba9bb);color:#fff;border:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;cursor:pointer;font-weight:700;font-size:14px;text-align:left;position:relative;overflow:hidden;transition:filter .15s}
.filters-map-btn:hover{filter:brightness(1.05)}
.filters-map-btn .pin{font-size:18px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.filters-map-btn .sub{font-size:11.5px;font-weight:500;opacity:.92;display:block;margin-top:2px}
.filters-map-btn::after{content:'→';margin-left:auto;font-size:18px}

/* Tweaks indicator — small pill bottom-left shows which PDP tweaks are active */
.tweaks-indicator{position:fixed;left:24px;bottom:24px;z-index:50;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:8px 14px;font-size:12px;color:var(--ink-700);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:8px;max-width:340px}
.tweaks-indicator .lbl{font-weight:800;color:var(--ink-900);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.tweaks-indicator .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;background:var(--c-success-bg);color:var(--c-success);font-weight:700;font-size:11px}
.tweaks-indicator a{color:var(--c-primary);text-decoration:underline;font-size:11px;font-weight:600}

/* Fullscreen map overlay — 3-column: filters | mini list | map */
.map-fullscreen{position:fixed;inset:0;background:#fff;z-index:200;display:flex;flex-direction:column}
.map-fs-top{padding:10px 20px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-shrink:0}
.map-fs-top h2{font-size:16px;flex:1;margin:0}
.map-fs-close{padding:8px 14px;background:var(--ink-900);color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}
.map-fs-body{flex:1;display:grid;grid-template-columns:240px 340px 1fr;overflow:hidden;min-height:0}
@media (max-width:1100px){.map-fs-body{grid-template-columns:200px 320px 1fr}}
@media (max-width:900px){.map-fs-body{grid-template-columns:1fr;grid-template-rows:200px 1fr}}
.map-fs-filters{background:#fff;border-right:1px solid var(--line);overflow-y:auto;padding:0}
.map-fs-filters .fl-group{padding:12px 14px}
.map-fs-filters .fl-title{font-size:12.5px}
.map-fs-list{background:#fff;border-right:1px solid var(--line);overflow-y:auto;padding:10px 12px}
.map-fs-list-header{font-size:12.5px;color:var(--ink-500);padding:6px 4px 10px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px}
.list-collapse-btn{background:transparent;border:0;color:var(--c-primary);font-size:11.5px;font-weight:700;cursor:pointer;padding:2px 6px;font-family:inherit;border-radius:6px}
.list-collapse-btn:hover{background:var(--surface-2)}
.mini-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:8px;display:grid;grid-template-columns:80px 1fr;gap:10px;cursor:pointer;margin-bottom:8px;transition:border-color .15s, box-shadow .15s}
.mini-card:hover{border-color:var(--line-strong);box-shadow:var(--shadow-sm)}
.mini-card.active{border-color:var(--ink-900);box-shadow:0 0 0 2px rgba(31,42,54,.12)}
.mini-card .mini-img{width:80px;height:64px;border-radius:6px;background:#dbe6ec center/cover;background-size:cover;flex-shrink:0;position:relative;overflow:hidden}
.mini-card .mini-img img{width:100%;height:100%;object-fit:cover}
.mini-card .mini-heart{position:absolute;top:4px;right:4px;background:rgba(255,255,255,.94);border:0;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;line-height:1;color:var(--ink-700)}
.mini-card .mini-heart.saved{color:var(--c-primary)}
.mini-card .mini-info{display:flex;flex-direction:column;gap:3px;min-width:0}
.mini-card .mini-name{font-size:13px;font-weight:700;color:var(--info);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-card .mini-meta{font-size:11px;color:var(--ink-500);display:flex;gap:8px;align-items:center}
.mini-card .mini-meta .num{background:var(--c-success);color:#fff;font-weight:800;padding:1px 5px;border-radius:4px;font-size:10.5px}
.mini-card .mini-price{font-size:13px;font-weight:800;color:var(--c-cta);margin-top:auto}
.mini-card .mini-price small{color:var(--ink-500);font-weight:500;font-size:10px;margin-left:4px}
.map-fs-mapcol{position:relative;background:#dbe6ec}
.map-fs-mapcol .map-col{position:absolute !important;inset:0 !important;height:100% !important;max-height:none !important;top:0 !important;border-radius:0}

/* Compact results row — desktop: normal flow; mobile: sticky (overridden below) */
.results-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:6px 0;flex-wrap:wrap}
.results-bar .summary-left{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--ink-500)}
.results-bar .summary-left .count{color:var(--ink-900);font-weight:800;font-size:15px}
.results-bar .summary-left .cancel-stat{color:var(--c-success);font-weight:700}
.results-bar .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.results-bar select{padding:6px 10px;border:1px solid var(--line-strong);border-radius:var(--radius);background:#fff;font-family:inherit;font-size:13px;font-weight:600}

/* VIP teaser inside list */
.vip-list-teaser{background:linear-gradient(135deg,#FFE8EA,#FFF1E6);border:1px solid #F6C5C9;border-radius:var(--radius-lg);padding:14px 18px;display:flex;gap:14px;align-items:center;margin:0}
.vip-list-teaser .vip-word{font-size:32px;font-weight:900;color:var(--c-cta);font-style:italic;line-height:1;letter-spacing:-.02em;flex-shrink:0}
.vip-list-teaser .body{flex:1}
.vip-list-teaser h4{font-size:15px;color:var(--ink-900);margin-bottom:2px}
.vip-list-teaser p{margin:0;font-size:12.5px;color:var(--ink-700)}
.vip-list-teaser button{padding:8px 16px;background:var(--c-cta);color:#fff;border:0;border-radius:8px;font-weight:800;cursor:pointer;flex-shrink:0;font-size:13px}

/* Filters */
.filters-col{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);position:sticky;top:84px;max-height:calc(100vh - 100px);overflow-y:auto}
.fl-group{padding:14px 16px;border-bottom:1px solid var(--line)}
.fl-group:last-of-type{border-bottom:0}
.fl-title{font-size:13px;font-weight:800;color:var(--ink-900);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.fl-title .chev{transition:transform .15s}
.fl-title.collapsed .chev{transform:rotate(-90deg)}
.fl-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:var(--ink-700);gap:8px;cursor:pointer}
.fl-row:hover{color:var(--ink-900)}
.fl-row input[type="checkbox"]{accent-color:var(--c-primary);flex-shrink:0}
.fl-row .cnt{color:var(--ink-400);font-size:12.5px}

/* ===== Hotel card — canonical reference design =====
   Layout: image left (rounded), single content body right.
   Body stack: name+stars → location → score+reviews → optional VIP signup pill →
   price block (right-aligned: strike+info+−X% pill, big red price, green perks). */
.list-col{display:flex;flex-direction:column;gap:10px;min-width:0}
.hotel-card{background:#fff;border:0;border-radius:var(--radius-lg);display:grid;grid-template-columns:340px minmax(0,1fr);gap:18px;padding:14px;overflow:visible;cursor:pointer;transition:background .15s, box-shadow .15s;min-height:0}
.hotel-card:hover{background:var(--surface-2);box-shadow:var(--shadow-sm)}
.hotel-card.highlight{box-shadow:0 0 0 3px var(--ink-900)}
.hotel-img{position:relative;border-radius:var(--radius-lg);overflow:hidden;background:var(--surface-3);background-size:cover;background-position:center;min-height:240px}
.hotel-img img{display:block;width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.hotel-img .heart{position:absolute;top:10px;right:10px;width:36px;height:36px;background:rgba(255,255,255,.92);border:0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-700);z-index:3;font-size:16px;line-height:1}
.hotel-img .heart.saved{color:var(--c-primary)}
.hotel-img .heart:hover{background:#fff}
/* Single campaign badge — top-left, themed by signal (VIP > top-score > deal > city) */
.campaign-badge{position:absolute;top:12px;left:12px;padding:6px 12px;border-radius:6px;font-size:12.5px;font-weight:700;color:#fff;letter-spacing:.01em;z-index:3;line-height:1.2;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.campaign-badge.cb-vip{background:#6E2EE5}
.campaign-badge.cb-top{background:#0E8F8F}
.campaign-badge.cb-deal{background:var(--c-cta)}
.campaign-badge.cb-city{background:rgba(0,0,0,.72)}
/* Drop carousel chrome + the old multiple-overlay labels — campaign-badge replaces all of them */
.hotel-img .discount,.hotel-img .vip-eligible,.hotel-img-label,.hotel-img .card-arrow,.hotel-img .card-dots{display:none}

/* Body — single column with everything stacked */
.hotel-body{display:flex;flex-direction:column;gap:6px;padding:2px 4px 4px 0;min-width:0}
.hotel-body h3{margin:0;font-size:19px;font-weight:800;color:var(--ink-900);line-height:1.25;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.hotel-body h3 .stars{color:var(--c-warn-low);letter-spacing:1px;font-size:.7em;font-weight:600;margin-left:6px;vertical-align:.18em;white-space:nowrap}
.hotel-body h3 .stars .superior{color:var(--info);font-size:.78em;margin-left:4px;font-weight:600}
.hotel-body .location{font-size:14px;color:var(--ink-500);line-height:1.4}
.hotel-body .score-row{display:inline-flex;align-items:center;gap:10px;margin-top:6px;align-self:flex-start}
.hotel-body .score-num{min-width:38px;height:38px;padding:0 8px;border-radius:8px;background:var(--c-success);color:#fff;font-weight:800;font-size:14.5px;display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
.hotel-body .score-count{font-size:13.5px;color:var(--ink-700);font-weight:500}

/* VIP signup CTA-like pill (only when !loggedIn && vipEligible) — borderless, 1 line */
.vip-signup{display:inline-flex;align-items:center;gap:10px;background:var(--surface-2);border:0;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:700;color:var(--ink-900);cursor:pointer;align-self:flex-start;text-align:left;margin-top:6px;white-space:nowrap;transition:background .15s}
.vip-signup .flag{color:var(--c-primary);font-size:14px;line-height:1}
.vip-signup .vs-short{display:none}
.vip-signup:hover{background:#ECEEF2}

/* Price block — right-aligned column at the bottom of body */
.price-block{margin-top:auto;display:flex;flex-direction:column;align-items:flex-end;text-align:right;gap:4px;padding-top:8px}
.strike-row{display:inline-flex;align-items:center;gap:8px}
.strike-row .strike{text-decoration:line-through;color:var(--ink-400);font-size:13.5px;font-weight:500}
.strike-row .info-icon{font-size:13px;color:var(--ink-400);cursor:help;line-height:1;border:1px solid var(--ink-300);border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
.strike-row .discount-pill{background:var(--c-primary);color:#fff;font-weight:800;font-size:12.5px;padding:3px 9px;border-radius:6px}
.big-price{color:var(--c-primary);font-weight:900;font-size:30px;font-family:var(--font-ui);letter-spacing:-.02em;line-height:1.05;display:inline-flex;align-items:baseline;gap:4px}
.big-price .ft{font-size:16px;color:var(--c-primary);font-weight:700}
.perks{display:flex;flex-direction:column;gap:2px;align-items:flex-end;margin-top:2px}
.perks .perk{font-size:13px;color:var(--c-success);font-weight:600;line-height:1.35}

/* Split view (list + map) — narrower list column means tighter image + drop signup */
.layout.with-map .hotel-card{grid-template-columns:240px minmax(0,1fr);padding:10px;gap:12px}
.layout.with-map .hotel-img{min-height:220px}
.layout.with-map .hotel-body h3{font-size:17px}
.layout.with-map .hotel-body .score-num{min-width:34px;height:34px;font-size:13px}
.layout.with-map .vip-signup{display:none}
.layout.with-map .big-price{font-size:25px}
.layout.with-map .campaign-badge{padding:4px 10px;font-size:11.5px;top:10px;left:10px}

/* Narrow desktop fallback — when viewport < 900px but not mobile-toggled */
@media (max-width:900px){.hotel-card{grid-template-columns:260px minmax(0,1fr);padding:10px;gap:12px}.hotel-img{min-height:220px}.hotel-body h3{font-size:17px}}

/* Map column */
.map-col{position:sticky;top:84px;height:calc(100vh - 100px);border-radius:var(--radius-lg);overflow:hidden;background:#dbe6ec;box-shadow:var(--shadow-sm)}
.map-col > div{width:100%;height:100%}
.price-pin-html{background:var(--c-primary);color:#fff;padding:5px 10px;border-radius:12px;font-weight:800;font-size:12.5px;border:2px solid #fff;box-shadow:0 4px 12px rgba(227,6,19,.35);white-space:nowrap}
.price-pin-html.active{background:var(--c-success);box-shadow:0 4px 14px rgba(31,127,62,.45);transform:scale(1.1)}

/* Footer */
.footer{background:#0f1419;color:#cbd2da;padding:48px 24px 24px;margin-top:48px}
.footer-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px}
.footer h5{color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.footer ul{list-style:none;padding:0;margin:0;display:grid;gap:8px;font-size:13.5px}
.footer a{color:#cbd2da}
.footer-bottom{max-width:1400px;margin:32px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;font-size:12.5px;color:#8a93a1}
.footer-trust{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.footer-trust-badge{padding:5px 10px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:11px}
@media (max-width:900px){.footer-inner{grid-template-columns:repeat(2,1fr)}}
  
/* === Shared brandbar (master library, mirror PDP) === */
.brandbar{background:#fff;border-bottom:1px solid var(--line);height:60px;overflow:visible}
.brandbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px;flex-wrap:nowrap;min-width:0;overflow:visible}
.brandbar .brand-right{color:var(--ink-900);margin-left:auto;display:flex;gap:14px;align-items:center;font-size:14px}

  const fg = kind==='allinc' ? '#6B21A8' : kind==='halfboard' ? '#C84B00' : kind==='breakfast' ? 'var(--c-success)' : 'var(--ink-700)';
  const icon = kind==='allinc' ? '🥂' : kind==='halfboard' ? '🍽️' : kind==='breakfast' ? '🍳' : '🛏️';
  return <span style={{background:bg,color:fg,padding:'4px 9px',borderRadius:8,fontSize:12.5,fontWeight:700,display:'inline-flex',gap:5,alignItems:'center'}}>{icon} {board}</span>;
};

const PHOTO_COUNT = 5;
const hotelPhotos = (id, baseImg) =>
  Array.from({length: PHOTO_COUNT}, (_, i) =>
    i === 0 ? baseImg : `https://picsum.photos/seed/szhotel-${id}-${i+1}/600/400`);

const HotelCard = ({ h, highlight, saved, onHover, onLeave, onSave, onClick }) => {
  const [imgIdx, setImgIdx] = React.useState(0);
  const imgs = React.useMemo(() => hotelPhotos(h.id, h.img), [h.id, h.img]);
  const touchStart = React.useRef(null);
  const goNext = (e) => { if(e) e.stopPropagation(); setImgIdx(i => (i+1) % PHOTO_COUNT); };
  const goPrev = (e) => { if(e) e.stopPropagation(); setImgIdx(i => (i-1+PHOTO_COUNT) % PHOTO_COUNT); };
  // Single campaign badge picks the strongest signal: VIP eligibility → top score → deal → city fallback
  const campaignBadge = h.vipEligible
    ? { lbl: 'VIP klub', cls: 'cb-vip' }
    : h.score >= 9.3
      ? { lbl: 'Top választás', cls: 'cb-top' }
      : h.discount > 0
        ? { lbl: 'Last minute', cls: 'cb-deal' }
        : { lbl: h.city, cls: 'cb-city' };
  const isVipApplied = tw.loggedIn && h.vipEligible;
  const showVipSignup = !tw.loggedIn && h.vipEligible;
  const basePrice = priceFor(h.price, tw.priceMode);
  const displayedPrice = isVipApplied ? Math.round(basePrice * VIP_DISCOUNT) : basePrice;
  const displayedStrike = isVipApplied
    ? basePrice
    : (tw.showPriceAnchor !== false && h.original > 0 ? priceFor(h.original, tw.priceMode) : null);
  const displayedDiscountPct = isVipApplied ? 15 : h.discount;
  const showStrikeRow = displayedStrike || displayedDiscountPct > 0;
  return (
  <div className={'hotel-card'+(highlight?' highlight':'')}
    role="link" tabIndex={0}
    aria-label={`${h.name}, ${h.stars} csillag, értékelés ${h.score} ${h.scoreLbl}, ${fmt(displayedPrice)} Ft`}
    onMouseEnter={onHover} onMouseLeave={onLeave}
    onClick={onClick}
    onKeyDown={(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); onClick && onClick(); } }}>
    <div className="hotel-img"
      onTouchStart={(e)=>{touchStart.current = e.touches[0].clientX}}
      onTouchEnd={(e)=>{
        if(touchStart.current==null) return;
        const dx = e.changedTouches[0].clientX - touchStart.current;
        if(Math.abs(dx) > 30){ dx<0 ? goNext() : goPrev(); }
        touchStart.current = null;
      }}>
      <img src={imgs[imgIdx]} alt={h.name} loading="lazy"/>
      <button className={'heart'+(saved?' saved':'')}
        aria-label={saved ? 'Eltávolítás a kedvencekből' : 'Hozzáadás a kedvencekhez'}
        aria-pressed={saved}
        onClick={(e)=>{e.stopPropagation();onSave()}}>{saved?'❤':'♡'}</button>
      <div className={'campaign-badge '+campaignBadge.cls}>{campaignBadge.lbl}</div>
    </div>
    <div className="hotel-body">
      <h3>{h.name}<span className="stars"> {'★'.repeat(h.stars)}{h.superior && <span className="superior">+sup</span>}</span></h3>
      <div className="location">{h.distance} · {h.city}</div>
      <div className="score-row">
        <div className="score-num">{h.score}</div>
        <span className="score-count">{fmt(h.reviews)} értékelés</span>
      </div>
      {showVipSignup && (
        <button className="vip-signup" onClick={(e)=>e.stopPropagation()}>
          <span className="flag">🚩</span>
          <span className="vs-full">Lépj be VIP kedvezményért</span>
          <span className="vs-short">VIP −15% feloldása</span>
        </button>
      )}
      <div className="price-block">
        {showStrikeRow && (
          <div className="strike-row">
            {displayedStrike && <span className="strike">{fmt(displayedStrike)} Ft</span>}
            <span className="info-icon" title="Adók és díjak benne">i</span>
            {displayedDiscountPct > 0 && <span className="discount-pill">−{displayedDiscountPct}%</span>}
          </div>
        )}
        <div className="big-price">{fmt(displayedPrice)}<span className="ft">Ft</span></div>
        <div className="perks">
          {h.refundable && <div className="perk">Ingyenes lemondás {h.cancelUntil}-ig</div>}
          <div className="perk">{h.board}</div>
        </div>
      </div>
    </div>
  </div>
  );
};

const FilterGroup = ({ title, items, expanded=true, type='check' }) => {
  const [open, setOpen] = React.useState(expanded);

const MapView = ({ hotels, activeId, onMarkerClick }) => {
  const mapRef = React.useRef(null);
  const mapObj = React.useRef(null);
  const markers = React.useRef({});

  React.useEffect(() => {
    if (!mapRef.current || mapObj.current) return;
    if (typeof L === 'undefined') return;
    const map = L.map(mapRef.current, { scrollWheelZoom: true }).setView([46.85, 17.85], 9);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'© OpenStreetMap' }).addTo(map);
    hotels.forEach(h => {
      const icon = L.divIcon({
        className:'price-pin-wrap',
        html:`<div class="price-pin-html" data-id="${h.id}">${fmt(h.price)} Ft</div>`,
        iconSize:[80,30],
        iconAnchor:[40,15]
      });
      const m = L.marker([h.lat, h.lng], { icon })
        .bindPopup(`<div style="font-weight:700">${h.name}</div><div style="font-size:12px;color:#6B7683">${h.city} · ${h.scoreLbl} ${h.score}</div><div style="font-size:13px;color:#E85A00;font-weight:800;margin-top:4px">${fmt(h.price)} Ft / 2 fő, 1 éj</div>`)
        .addTo(map);
      m.on('click', () => onMarkerClick && onMarkerClick(h.id));
      markers.current[h.id] = m;
    });
    mapObj.current = map;
    return () => { map.remove(); mapObj.current = null; };
  }, []);

  React.useEffect(() => {
    if (!mapObj.current) return;
    Object.entries(markers.current).forEach(([id, m]) => {
      const el = m.getElement()?.querySelector('.price-pin-html');
      if (el) el.classList.toggle('active', id===activeId);
    });
    if (activeId && markers.current[activeId]) {
      const m = markers.current[activeId];
      mapObj.current.flyTo(m.getLatLng(), Math.max(mapObj.current.getZoom(), 11), { duration:0.6 });
    }
  }, [activeId]);

  return <div className="map-col"><div ref={mapRef}/></div>;
};
