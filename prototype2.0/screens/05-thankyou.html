<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Köszönjük! · Szallas.hu</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --c-primary:#E30613;--c-cta:#E85A00;
  --c-success:#1F7F3E;--c-success-bg:#E8F5EC;
  --c-deal-bg:#FFF1E6;--c-deal-ink:#C84B00;
  --ink-900:#1F2A36;--ink-700:#394654;--ink-500:#6B7683;--ink-400:#8A93A1;
  --line:#E1E4EA;--line-strong:#C9CED6;
  --surface:#FFFFFF;--surface-2:#F5F6F8;--surface-3:#ECEEF2;
  --info:#1F6FE0;
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
  --shadow-sm:0 1px 2px rgba(31,42,54,.06),0 2px 6px rgba(31,42,54,.06);
  --shadow:0 2px 6px rgba(31,42,54,.06),0 6px 18px rgba(31,42,54,.08);
  --shadow-lg:0 4px 12px rgba(31,42,54,.08),0 8px 24px rgba(31,42,54,.06);
  --shadow-cta:0 6px 18px rgba(227,6,19,.28);
  --font-ui:'Inter','Segoe UI',Roboto,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--surface-2);color:var(--ink-900);font-family:var(--font-ui);font-weight:500;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;font-weight:500}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{margin:0;font-weight:800;color:var(--ink-900);letter-spacing:-.01em}



.stepper{background:#fff;border-bottom:1px solid var(--line);padding:18px 24px}
.stepper-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:14px}
.step{display:flex;align-items:center;gap:10px;color:var(--ink-500);font-size:14px;flex:0 0 auto}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--surface-3);color:var(--ink-700);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.step.done .step-num{background:var(--c-success);color:#fff}
.step.active{color:var(--ink-900);font-weight:700}
.step.active .step-num{background:var(--c-success);color:#fff}
.step-line{flex:1;height:2px;background:var(--c-success);min-width:30px;border-radius:1px}

.page{max-width:1100px;margin:0 auto;padding:32px 24px}

/* Confirmation hero */
.hero{background:linear-gradient(135deg,#E8F5EC,#D1EAD9);border-radius:var(--radius-xl);padding:48px 32px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(31,127,62,.12) 0%,transparent 70%);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-30px;left:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(31,127,62,.08) 0%,transparent 70%);border-radius:50%}
.checkmark{width:88px;height:88px;background:var(--c-success);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 12px 30px rgba(31,127,62,.35);animation:check-pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes check-pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.checkmark svg{width:48px;height:48px;color:#fff;animation:check-draw .6s ease-out .2s both}
@keyframes check-draw{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
.hero h1{font-size:36px;margin-bottom:10px;font-weight:900;position:relative}
.hero p.sub{font-size:16px;color:var(--ink-700);max-width:560px;margin:0 auto;position:relative}
.hero .email{color:var(--c-primary);font-weight:700}

.ref-card{background:#fff;border:2px dashed var(--c-success);border-radius:var(--radius-lg);padding:18px 24px;max-width:480px;margin:24px auto 0;display:flex;align-items:center;gap:18px;position:relative}
.ref-card .lbl{font-size:12px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.ref-card .val{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:18px;font-weight:800;color:var(--ink-900);letter-spacing:.02em}
.ref-card button{margin-left:auto;padding:8px 14px;background:var(--c-success);color:#fff;border:0;border-radius:var(--radius);font-weight:700;font-size:13px;cursor:pointer}
.ref-card button.copied{background:var(--ink-700)}

/* Card sections */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;margin-bottom:18px}
.card h2{font-size:18px;margin-bottom:14px}

.summary-grid{display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:start}
@media (max-width:600px){.summary-grid{grid-template-columns:1fr}}
.summary-img{aspect-ratio:16/10;border-radius:var(--radius);background:linear-gradient(135deg,#dbe6ec,#a7c5d3);background-size:cover;background-position:center}
.summary-info .name{font-size:17px;font-weight:800;margin-bottom:6px}
.summary-info .meta{display:grid;gap:6px;font-size:13.5px;color:var(--ink-700)}
.summary-info .total{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-end}
.summary-info .total b{font-size:20px;color:var(--c-cta);font-weight:900}

/* Next steps */
.next-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media (max-width:700px){.next-grid{grid-template-columns:1fr}}
.next-tile{padding:18px 16px;background:var(--surface-2);border-radius:var(--radius);display:flex;flex-direction:column;gap:6px}
.next-tile .ico{font-size:24px;line-height:1;margin-bottom:6px}
.next-tile .ttl{font-weight:700;font-size:14px;color:var(--ink-900)}
.next-tile .sub{font-size:12.5px;color:var(--ink-500);line-height:1.5}

/* Calendar buttons */
.cal-row{display:flex;gap:10px;flex-wrap:wrap}
.cal-btn{padding:10px 16px;background:#fff;border:1px solid var(--line-strong);border-radius:var(--radius);font-weight:600;font-size:13.5px;color:var(--ink-700);cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.cal-btn:hover{border-color:var(--ink-700);color:var(--ink-900)}

/* SMS opt-in */
.sms-row{display:flex;gap:10px;align-items:flex-start;padding:14px 16px;background:var(--surface-2);border-radius:var(--radius);cursor:pointer;font-size:13.5px;color:var(--ink-700);line-height:1.5}
.sms-row input{accent-color:var(--c-primary);width:16px;height:16px;margin-top:3px;flex-shrink:0}
.sms-input-row{margin-top:10px;display:flex;gap:8px;align-items:flex-end}
.sms-input-row input{flex:1;border:1px solid var(--line-strong);border-radius:var(--radius);padding:10px 12px;font-family:inherit;font-size:14px}
.sms-input-row button{padding:10px 16px;background:var(--c-primary);color:#fff;border:0;border-radius:var(--radius);font-weight:700}

/* Cross-sell */
.cross-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media (max-width:800px){.cross-grid{grid-template-columns:repeat(2,1fr)}}
.cross-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .15s, transform .15s}
.cross-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.cross-img{aspect-ratio:1/1;background:linear-gradient(135deg,#dbe6ec,#a7c5d3)}
.cross-info{padding:10px}
.cross-info .ttl{font-size:13.5px;font-weight:700}
.cross-info .price{font-size:12.5px;color:var(--c-cta);font-weight:700;margin-top:2px}

/* VIP teaser */
.vip-teaser{background:linear-gradient(135deg,#FFE8EA,#FFF1E6);border-radius:var(--radius-lg);padding:24px;display:flex;gap:20px;align-items:center;border:1px solid #FFE8EA}
.vip-teaser .word{font-size:48px;font-weight:900;color:var(--c-cta);font-style:italic;line-height:1}
.vip-teaser .body{flex:1}
.vip-teaser h3{font-size:18px;color:var(--ink-900);margin-bottom:4px}
.vip-teaser p{font-size:13.5px;color:var(--ink-700);margin-bottom:12px;line-height:1.5}
.vip-teaser button{padding:10px 20px;background:var(--c-cta);color:#fff;border:0;border-radius:var(--radius);font-weight:800;cursor:pointer}

.tweaks-indicator{position:fixed;left:24px;bottom:24px;z-index:50;background:#fff;border:1px solid var(--line-strong);border-radius:999px;padding:8px 14px;font-size:12px;color:var(--ink-700);box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:8px;max-width:340px}
.tweaks-indicator .lbl{font-weight:800;color:var(--ink-900);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.tweaks-indicator .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;background:var(--c-success-bg);color:var(--c-success);font-weight:700;font-size:11px}
.tweaks-indicator a{color:var(--c-primary);text-decoration:underline;font-size:11px;font-weight:600}

.footer{background:#0f1419;color:#cbd2da;padding:32px 24px 20px;margin-top:48px;font-size:12.5px;text-align:center}
.footer a{color:#cbd2da;margin:0 12px}
  
/* === Shared brandbar (master library, mirror PDP) === */
.brandbar{background:#D20000;border-bottom:1px solid #8c040d;height:60px;overflow:visible}
.brandbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px;flex-wrap:nowrap;min-width:0;overflow:visible}
.brandbar .brand-right{color:#fff;margin-left:auto;display:flex;gap:14px;align-items:center;font-size:14px}
.brandbar .callcenter-trigger,.brandbar .account-btn,.brandbar .hamburger-trigger{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;backdrop-filter:blur(4px)}
.brandbar .callcenter-trigger:hover,.brandbar .account-btn:hover,.brandbar .hamburger-trigger:hover{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5);color:#fff}
.brandbar .cc-ring{background:rgba(255,255,255,.18);color:#fff}
.brandbar .account-btn:hover .cc-ring{background:#fff;color:var(--c-primary)}
.brandbar .cc-lbl{color:rgba(255,255,255,.82)}
.brandbar .cc-num,.brandbar .cc-chev{color:#fff}
.logo-brand{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:inherit;flex-shrink:0;white-space:nowrap;height:60px}
.logo-word{font-family:'Inter',serif;font-size:26px;line-height:1;letter-spacing:-.5px;color:#fff;font-style:italic;font-weight:900;white-space:nowrap;flex-shrink:0}
.logo-dot{color:#FF5A00}
.logo-tag{position:relative;background:#fff;color:var(--c-primary);font-size:10px;font-weight:800;line-height:1.05;padding:6px 9px 7px;border-radius:999px;display:inline-flex;flex-direction:column;text-align:center;letter-spacing:.01em;transform:rotate(-6deg);box-shadow:0 2px 6px rgba(0,0,0,.18)}
.logo-tag::after{content:"";position:absolute;left:-5px;bottom:3px;width:10px;height:10px;background:#fff;border-radius:2px;transform:rotate(45deg);clip-path:polygon(0 0, 100% 100%, 0 100%)}
.logo-tag span{white-space:nowrap}
.callcenter{position:relative}
.callcenter-trigger{display:inline-flex;align-items:center;gap:12px;padding:5px 18px 5px 5px;border-radius:999px;cursor:pointer;transition:all .15s;border:1px solid transparent;background:transparent}
.cc-ring{width:38px;height:38px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.cc-text{display:flex;flex-direction:column;line-height:1.15;text-align:left}
.cc-lbl{font-size:11.5px;margin-top:2px}
.cc-num{font-size:15px;font-weight:800;letter-spacing:.01em;font-variant-numeric:tabular-nums}
.cc-chev{font-size:14px;margin-left:6px}
.account-btn{display:inline-flex;align-items:center;gap:10px;padding:5px 16px 5px 5px;border-radius:999px;cursor:pointer;transition:all .15s;font-family:inherit;background:transparent;border:1px solid transparent}
.hamburger{position:relative}
.hamburger-trigger{width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;font-size:18px}
/* === end shared brandbar === */

/* === MOBILE OVERRIDES === */
html[data-view="mobile"] .stepper{padding:10px 10px}
html[data-view="mobile"] .stepper-inner{gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
html[data-view="mobile"] .step{font-size:11px;gap:6px;flex-shrink:0}
html[data-view="mobile"] .step span{display:none}
html[data-view="mobile"] .step.active span{display:inline}
html[data-view="mobile"] .step-num{width:26px;height:26px;font-size:12px}
html[data-view="mobile"] .step-line{min-width:14px;flex:1 0 14px}
html[data-view="mobile"] .page{padding:18px 12px 24px}
html[data-view="mobile"] .hero{padding:28px 18px 24px;border-radius:var(--radius-lg);margin-bottom:18px}
html[data-view="mobile"] .checkmark{width:64px;height:64px;margin-bottom:14px}
html[data-view="mobile"] .checkmark svg{width:36px;height:36px}
html[data-view="mobile"] .hero h1{font-size:23px;margin-bottom:8px;line-height:1.2}
html[data-view="mobile"] .hero p.sub{font-size:13px;line-height:1.45}
html[data-view="mobile"] .ref-card{flex-direction:column;align-items:stretch;gap:10px;padding:14px 16px;margin-top:18px}
html[data-view="mobile"] .ref-card .val{font-size:15px}
html[data-view="mobile"] .ref-card button{margin-left:0;width:100%}
html[data-view="mobile"] .card{padding:16px 14px;margin-bottom:14px;border-radius:var(--radius)}
html[data-view="mobile"] .card h2{font-size:16px;margin-bottom:12px}
html[data-view="mobile"] .summary-grid{grid-template-columns:1fr;gap:12px}
html[data-view="mobile"] .summary-info .name{font-size:15.5px}
html[data-view="mobile"] .summary-info .meta{font-size:12.5px;gap:5px}
html[data-view="mobile"] .summary-info .total b{font-size:18px}
html[data-view="mobile"] .next-grid{grid-template-columns:1fr;gap:10px}
html[data-view="mobile"] .next-tile{padding:14px 14px}
html[data-view="mobile"] .next-tile .ico{font-size:20px}
html[data-view="mobile"] .next-tile .ttl{font-size:13.5px}
html[data-view="mobile"] .next-tile .sub{font-size:12px}
html[data-view="mobile"] .cal-row{flex-direction:column;gap:8px}
html[data-view="mobile"] .cal-btn{width:100%;justify-content:center;padding:11px 14px}
html[data-view="mobile"] .sms-row{font-size:12.5px;padding:12px 14px}
html[data-view="mobile"] .sms-input-row{flex-direction:column;align-items:stretch;gap:8px}
html[data-view="mobile"] .sms-input-row button{width:100%;padding:11px}
html[data-view="mobile"] .cross-grid{grid-template-columns:1fr 1fr;gap:10px}
html[data-view="mobile"] .cross-info .ttl{font-size:12.5px}
html[data-view="mobile"] .cross-info .price{font-size:11.5px}
html[data-view="mobile"] .vip-teaser{flex-direction:column;text-align:center;gap:12px;padding:20px 18px}
html[data-view="mobile"] .vip-teaser .word{font-size:40px}
html[data-view="mobile"] .vip-teaser h3{font-size:16px}
html[data-view="mobile"] .vip-teaser p{font-size:13px}
html[data-view="mobile"] .footer{padding:18px 14px 14px;text-align:center}

/* === Global focus-visible ring (a11y) === */
*:focus-visible{outline:2px solid var(--ink-900);outline-offset:2px;border-radius:3px}
button:focus-visible,a:focus-visible{outline-offset:3px}
.btn-primary:focus-visible,.btn-cta:focus-visible,.btn-search:focus-visible,.hotel-cta:focus-visible,.sps-btn:focus-visible{outline-color:#fff;outline-offset:-3px}
.field input:focus-visible,.field select:focus-visible,.field textarea:focus-visible{outline-offset:0}

</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const fmt = (n) => new Intl.NumberFormat('hu-HU').format(Math.round(n));
const REF = 'SZALLAS-2026-A4F7K2';
const EMAIL = 'mateusz@example.com';

// PDP tweaks
const tw = (()=>{ try{ return JSON.parse(localStorage.getItem('szallas_tweaks'))||{}; }catch(e){ return {}; } })();
const activeTweakChips = [];
if (tw.priceMode && tw.priceMode !== 'total') activeTweakChips.push(`price: ${tw.priceMode}`);
if (tw.loggedIn) activeTweakChips.push('VIP −15% applied');

const Page = () => {
  const [copied, setCopied] = React.useState(false);
  const [smsOn, setSmsOn] = React.useState(false);
  const [phone, setPhone] = React.useState('');
  const [smsSent, setSmsSent] = React.useState(false);

  const copy = () => {
    try { navigator.clipboard.writeText(REF); } catch(e){}
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <React.Fragment>
      <div className="brandbar">
        <div className="brandbar-inner">
          <a href="01-homepage.html" className="logo-brand" aria-label="Szallas.hu">
            <span className="logo-word">Szállás<span className="logo-dot">.</span>hu</span>
            <span className="logo-tag"><span>Úgy is</span><span>lett!</span></span>
          </a>
          <div className="brand-right">
            <div className="callcenter">
              <div className="callcenter-trigger" role="presentation">
                <span className="cc-ring">📞</span>
                <span className="cc-text">
                  <span className="cc-num">+36 30 344 2000</span>
                  <span className="cc-lbl">Ma 9:00–22:00</span>
                </span>
              </div>
            </div>
            <button className="account-btn" aria-label="Fiók">
              <span className="cc-ring">👤</span>
              <span className="cc-text">
                <span className="cc-lbl">Üdv, vendég</span>
                <span className="cc-num" style={{fontSize:14}}>Bejelentkezés</span>
              </span>
              <span className="cc-chev">▾</span>
            </button>
            <div className="hamburger">
              <div className="hamburger-trigger" role="button" aria-label="Menu">≡</div>
            </div>
          </div>
        </div>
      </div>

      <div className="page">
        <section className="hero">
          <div className="checkmark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="60" strokeDashoffset="0">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <h1>Köszönjük! A foglalásod sikeres.</h1>
          <p className="sub">Visszaigazoló e-mailt küldtünk a következő címre: <span className="email">{EMAIL}</span>. Ellenőrizd a spam mappát is, ha 5 percen belül nem érkezik meg.</p>
          <div className="ref-card">
            <div>
              <div className="lbl">Foglalási azonosító</div>
              <div className="val">{REF}</div>
            </div>
            <button className={copied?'copied':''} onClick={copy}>{copied ? '✓ Másolva' : 'Másolás'}</button>
          </div>
        </section>

        <section className="card">
          <h2>A foglalásod részletei</h2>
          <div className="summary-grid">
            <div className="summary-img" style={{backgroundImage:`url('https://picsum.photos/seed/szhotel-aurora-thankyou/480/300')`}}/>
            <div className="summary-info">
              <div className="name">Hotel Aurora Balaton ★★★★ <span style={{color:'var(--c-success)',fontSize:13,marginLeft:8}}>Kiváló 9.1</span></div>
              <div className="meta">
                <div>📍 Petőfi sétány 21, 8600 Siófok</div>
                <div>📅 <b>jún. 11. cs 14:00</b> – <b>jún. 13. szo 10:00 előtt</b> (3 nap, 2 éjszaka)</div>
                <div>👥 2 felnőtt</div>
                <div>🏠 1 × Standard kétágyas szoba (pótágyazható)</div>
                <div>🍽️ Félpanzió</div>
              </div>
              <div className="total">
                <div>
                  <div style={{fontSize:12.5,color:'var(--ink-500)'}}>Online fizetve · IFA {fmt(1544)} Ft a hotelben</div>
                  <div style={{fontSize:14,fontWeight:800,marginTop:2}}>Teljes ár</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <b>{fmt(38600)} Ft</b>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section className="card">
          <h2>Mi a következő lépés?</h2>
          <div className="next-grid">
            <div className="next-tile">
              <span className="ico">📧</span>
              <div className="ttl">Visszaigazoló e-mail</div>
              <div className="sub">Pár percen belül megkapod a foglalás részletes leírását és a check-in útmutatót.</div>
            </div>
            <div className="next-tile">
              <span className="ico">🏨</span>
              <div className="ttl">Bejelentkezés</div>
              <div className="sub">Érkezés 2026. jún. 11. csütörtök 14:00 órától. Hozd magaddal a foglalási azonosítót.</div>
            </div>
            <div className="next-tile">
              <span className="ico">✏️</span>
              <div className="ttl">Módosítás / lemondás</div>
              <div className="sub">Ingyenes lemondás 2026.06.08-ig. <a href="#" style={{color:'var(--c-primary)',textDecoration:'underline'}}>Foglalás kezelése →</a></div>
            </div>
          </div>
        </section>

        <section className="card">
          <h2>Mentsd a naptáradba</h2>

        <section className="card">
          <h2>SMS-emlékeztető (opcionális)</h2>

            <input type="checkbox" checked={smsOn} onChange={(e)=>setSmsOn(e.target.checked)}/>

          {smsOn && !smsSent && (
            <div className="sms-input-row">
              <input type="tel" placeholder="+36 30 …" value={phone} onChange={(e)=>setPhone(e.target.value)}/>

            </div>
          )}
          {smsSent && (
            <div style={{marginTop:10,padding:'10px 14px',background:'var(--c-success-bg)',color:'var(--c-success)',borderRadius:'var(--radius)',fontSize:13.5,fontWeight:700}}>

          )}
        </section>

        <section className="card">
          <h2>Programok a közelben — fedezd fel Siófokot</h2>

          <div className="cross-grid">
            <a className="cross-card">
              <div className="cross-img" style={{background:'linear-gradient(135deg,#dbe6ec,#7a9aab)'}}/>
              <div className="cross-info">
                <div className="ttl">Balaton hajókirándulás</div>
                <div className="price">8 900 Ft / fő</div>
              </div>
            </a>
            <a className="cross-card">
              <div className="cross-img" style={{background:'linear-gradient(135deg,#dde2cf,#a7ad94)'}}/>
              <div className="cross-info">
                <div className="ttl">Siófok wellness day-pass</div>
                <div className="price">12 500 Ft / fő</div>
              </div>
            </a>
            <a className="cross-card">
              <div className="cross-img" style={{background:'linear-gradient(135deg,#cfb5d8,#9a85a3)'}}/>
              <div className="cross-info">
                <div className="ttl">Borkóstoló a Balaton-felvidéken</div>
                <div className="price">15 900 Ft / fő</div>
              </div>
            </a>
            <a className="cross-card">
              <div className="cross-img" style={{background:'linear-gradient(135deg,#e4d7b5,#b5a785)'}}/>
              <div className="cross-info">
                <div className="ttl">Kerékpárkölcsönzés napi</div>
                <div className="price">3 500 Ft / nap</div>
              </div>
            </a>
          </div>
        </section>

        {!tw.loggedIn && (
          <section className="vip-teaser">
            <div className="word">VIP</div>
            <div className="body">
              <h3>Regisztrálj a Szallas.hu VIP programra</h3>
              <p>Kapj <b>5% kedvezményt</b> a következő foglalásodra + exkluzív ajánlatok, 10–20% VIP-árak a partner-szálláshelyeken.</p>
              <button>Regisztrálok</button>
            </div>
          </section>
        )}
        {tw.loggedIn && (
          <section className="vip-teaser" style={{background:'linear-gradient(135deg,#F5EAFF,#FFE8EA)'}}>
            <div className="word" style={{color:'#6B21A8'}}>VIP</div>
            <div className="body">
              <h3>Köszönjük, hogy VIP tag vagy! 💜</h3>
              <p>Ezt a foglalást már <b>VIP −15% kedvezménnyel</b> végeztük. Következő foglalásnál is jár 10–20% kedvezmény a partner-szálláshelyeken.</p>
              <button>VIP profilom</button>
            </div>
          </section>
        )}

        <p style={{fontSize:12,color:'var(--ink-500)',textAlign:'center',marginTop:24,lineHeight:1.6}}>
          Adataidat a foglalás teljesítéséhez használjuk fel. <a href="#" style={{color:'var(--c-primary)',textDecoration:'underline'}}>Hogyan kezeljük az adataidat?</a>
        </p>
      </div>

      <footer className="footer">
        <a href="01-homepage.html">Főoldal</a><a>Adatvédelem</a><a href="tel:+36303442000">+36 30 344 2000</a>
        <div style={{marginTop:8}}>© 2008–2026 Szallas.hu · 🔒 100% SSL</div>
      </footer>

      {activeTweakChips.length > 0 && (
        <div className="tweaks-indicator">
          <span className="lbl">PDP tweaks aktív:</span>
          {activeTweakChips.map((c,i)=><span key={i} className="chip">{c}</span>)}
          <a href="../Hotel%20Aurora%20Balaton%20-%20standalone.html">változtatás →</a>
        </div>
      )}
    </React.Fragment>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
  </script>
  <script src="tweaks-overlay.js?v=responsive"></script>
