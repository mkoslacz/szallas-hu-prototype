<!DOCTYPE html>
<!--
  ds.html — Szallas.hu prototype design system bootstrap.
  Each screen (homepage, listing, checkout, payment, thankyou) starts from this file:
  copy the entire <head> block and the BrandBar/Footer scripts at the bottom of <body>,
  then add screen-specific content between them.

  Tokens, base CSS, React 18 CDN, Babel CDN, and shared components (BrandBar, Footer,
  SearchBar, Photo, Stepper, Tag, Switch, Seg, Icons) all live here.
-->
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Szallas.hu — Design system bootstrap</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style id="ds-tokens">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    :root{
      --c-primary:#E30613; --c-primary-hover:#b40510; --c-primary-press:#8c040d;
      --c-cta:#E85A00;
      --c-grad-from:#FF5A00; --c-grad-to:#D8001A;
      --c-success:#1F7F3E; --c-success-bg:#E8F5EC;
      --c-deal-bg:#FFF1E6; --c-deal-ink:#C84B00;
      --c-warn-low:#F5A524;
      --primary:var(--c-primary); --primary-hover:var(--c-primary-hover);
      --primary-soft:#FFE8EA; --primary-border:#F6C5C9;
      --ink-900:#1F2A36; --ink-700:#394654; --ink-500:#6B7683; --ink-400:#8A93A1; --ink-300:#A1A8B3;
      --line:#E1E4EA; --line-strong:#C9CED6;
      --surface:#FFFFFF; --surface-2:#F5F6F8; --surface-3:#ECEEF2;
      --success:var(--c-success); --success-soft:var(--c-success-bg);
      --warn:#F5A524; --info:#1F6FE0;
      --radius-sm:6px; --radius:10px; --radius-lg:14px; --radius-xl:20px;
      --shadow-sm:0 1px 2px rgba(31,42,54,.06), 0 2px 6px rgba(31,42,54,.06);
      --shadow:0 2px 6px rgba(31,42,54,.06), 0 6px 18px rgba(31,42,54,.08);
      --shadow-lg:0 4px 12px rgba(31,42,54,.08), 0 8px 24px rgba(31,42,54,.06);
      --shadow-cta:0 6px 18px rgba(227,6,19,.28);
      --font-ui:'Inter','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    }
  </style>
  <style id="ds-base">
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:var(--ink-900);font-family:var(--font-ui);font-weight:500;-webkit-font-smoothing:antialiased}
    body{min-height:100vh}
    button{font-family:inherit;cursor:pointer;font-weight:500}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    h1,h2,h3,h4{margin:0;font-weight:800;color:var(--ink-900);letter-spacing:-.01em}
    h1{font-size:32px}h2{font-size:24px}h3{font-size:18px}h4{font-size:15px}
    p{margin:0;line-height:1.55}
  </style>
  <style id="ds-components">
    /* BrandBar */
    .brandbar{background:#D20000;border-bottom:1px solid #8c040d;height:60px;overflow:visible}
    .brandbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px}
    .brandbar-logo{display:flex;align-items:center;gap:10px;color:#fff;font-style:italic;font-weight:900;font-size:24px;letter-spacing:-.5px}
    .brandbar-logo .dot{color:#FF5A00}
    .brandbar-spacer{flex:1}
    .brandbar-actions{display:flex;gap:10px;align-items:center;color:#fff;font-size:14px}
    .brandbar-actions a{padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff}
    .brandbar-actions a:hover{background:rgba(255,255,255,.22)}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:var(--radius);font-weight:700;font-size:14px;border:1px solid transparent;cursor:pointer;transition:background .12s, transform .12s, box-shadow .12s}
    .btn-primary{background:var(--c-primary);color:#fff;box-shadow:var(--shadow-cta)}
    .btn-primary:hover{background:var(--c-primary-hover)}
    .btn-cta{background:var(--c-cta);color:#fff}
    .btn-cta:hover{filter:brightness(1.05)}
    .btn-secondary{background:#fff;color:var(--ink-900);border:1px solid var(--line-strong)}
    .btn-secondary:hover{border-color:var(--c-primary);color:var(--c-primary)}
    .btn-ghost{background:transparent;color:var(--ink-700);border:0;padding:8px 12px}
    .btn-ghost:hover{color:var(--c-primary)}
    .btn.lg{padding:14px 22px;font-size:15px}
    .btn.sm{padding:7px 12px;font-size:13px}

    /* Tag / chip */
    .tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11.5px;font-weight:700;letter-spacing:.01em}
    .tag.green{background:var(--c-success-bg);color:var(--c-success)}
    .tag.red{background:#FEE2E2;color:#B91C1C}
    .tag.amber{background:var(--c-deal-bg);color:var(--c-deal-ink)}
    .tag.blue{background:#DBEAFE;color:#1E40AF}
    .tag.purple{background:#F3E8FF;color:#6B21A8}
    .tag.gray{background:var(--surface-3);color:var(--ink-700)}

    /* Card */
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow .15s, transform .15s}
    .card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}

    /* Score badge (square, matches rounded card corners) */
    .score-circle{width:44px;height:44px;border-radius:8px;background:var(--c-success);color:#fff;font-weight:800;font-size:17px;display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
    .score-pill{display:inline-flex;gap:10px;align-items:center}
    .score-pill .lbl{font-size:13px;color:var(--ink-900);font-weight:700}
    .score-pill .cnt{font-size:11.5px;color:var(--ink-500)}

    /* Container */
    .container{max-width:1200px;margin:0 auto;padding:0 24px}

    /* Inputs */
    .field{position:relative}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--line-strong);border-radius:var(--radius);padding:12px 14px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink-900)}
    .field input:focus,.field select:focus,.field textarea:focus{outline:0;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(227,6,19,.16)}
    .field-label{display:block;font-size:12.5px;color:var(--ink-700);margin-bottom:6px;font-weight:600}
    .field-error{color:#B91C1C;font-size:12px;margin-top:4px}

    /* Footer */
    .footer{background:#0f1419;color:#cbd2da;padding:48px 24px 24px}
    .footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:32px}
    .footer h5{color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
    .footer ul{list-style:none;padding:0;margin:0;display:grid;gap:8px;font-size:13.5px}
    .footer a{color:#cbd2da}.footer a:hover{color:#fff}
    .footer-bottom{max-width:1200px;margin:32px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;font-size:12.5px;color:#8a93a1}
    .footer-trust{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .footer-trust-badge{padding:5px 10px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:11px;color:#cbd2da}
    @media (max-width:900px){.footer-inner{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:560px){.footer-inner{grid-template-columns:1fr}}

    /* Search bar (homepage hero) */
    .search-bar{display:flex;background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;align-items:stretch}
    .search-bar > .field-cell{flex:1;padding:14px 18px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;border-right:1px solid var(--line)}
    .search-bar > .field-cell:last-of-type{border-right:0}
    .search-bar > .field-cell .lbl{font-size:11px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
    .search-bar > .field-cell .val{font-size:14.5px;color:var(--ink-900);font-weight:600;margin-top:2px}
    .search-bar > .btn-search{padding:0 26px;background:var(--c-primary);color:#fff;border:0;font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
    .search-bar > .btn-search:hover{background:var(--c-primary-hover)}

    /* Stepper bar (checkout/payment/thankyou progress) */
    .stepper{display:flex;align-items:center;gap:0;padding:14px 24px;background:#fff;border-bottom:1px solid var(--line)}
    .stepper-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:14px;width:100%}
    .step{display:flex;align-items:center;gap:10px;color:var(--ink-500);font-size:14px;flex:0 0 auto}
    .step-num{width:28px;height:28px;border-radius:50%;background:var(--surface-3);color:var(--ink-700);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
    .step.done .step-num{background:var(--c-success);color:#fff}
    .step.active{color:var(--ink-900);font-weight:700}
    .step.active .step-num{background:var(--c-primary);color:#fff}
    .step-line{flex:1;height:2px;background:var(--surface-3);min-width:24px}
    .step.done + .step-line{background:var(--c-success)}

    /* Photo / placeholder */
    .photo-real{display:block;width:100%;height:100%;object-fit:cover}
    .photo-placeholder{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8eef2,#d3dde3);color:#6e7c86;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

    /* Skeleton loading */
    @keyframes ds-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    html[data-loading="1"] img,
    html[data-loading="1"] .photo-real,
    html[data-loading="1"] .photo-placeholder{
      background:linear-gradient(90deg,#eef0f3 25%,#dde1e6 50%,#eef0f3 75%);
      background-size:200% 100%;animation:ds-shimmer 1.4s linear infinite;
      color:transparent !important;
    }

    /* Empty state card */
    .empty-state{padding:48px 24px;text-align:center;background:var(--surface-2);border-radius:var(--radius-lg);border:1px dashed var(--line-strong)}
    .empty-state .icon{font-size:48px;line-height:1;margin-bottom:10px}
    .empty-state h3{margin-bottom:6px;font-size:20px}
    .empty-state p{color:var(--ink-500);font-size:14px;max-width:480px;margin:0 auto}
  </style>
</head>
<body>
